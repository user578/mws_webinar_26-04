stages:
  - test
  - build
  - deploy

variables:
  KANIKO_IMAGE: "gcr.io/kaniko-project/executor:v1.23.2-debug"
  HELM_IMAGE: "alpine/helm:3.16"

  # Эту переменную нужно задать в CI/CD → Variables
  # MWS_SERVICE_ACCOUNT_KEY (JSON, masked)

  MWS_CLUSTER_NAME: "webinar"
  MWS_PROJECT_NAME: "mws-sdf"
  CI_REGISTRY: registry.mwsapis.ru
  CI_REGISTRY_IMAGE: registry.mwsapis.ru/mws-sdf/registry-cool-business-app/repository-app
  K8S_NAMESPACE: "app"
  HELM_RELEASE_NAME: "app"
  HELM_CHART_PATH: ./chart

test:
  stage: test
  image: golang:1.23
  script:
    - go mod download
    - go test -v ./...


build:
  stage: build
  image: ${KANIKO_IMAGE}

  before_script:
    - mkdir -p /kaniko/.docker
    - |
      cat > /kaniko/.docker/config.json <<EOF
      {
        "auths": {
          "registry.mwsapis.ru": {
            "username": "apikey",
            "password": "${CI_REGISTRY_PASSWORD}"
          }
        }
      }
      EOF

  script:
    - |
      /kaniko/executor \
        --context="${CI_PROJECT_DIR}" \
        --dockerfile="${CI_PROJECT_DIR}/Dockerfile" \
        --destination="registry.mwsapis.ru/mws-sdf/registry-cool-business-app/repository-app:${CI_COMMIT_SHA}" \
        --destination="registry.mwsapis.ru/mws-sdf/registry-cool-business-app/repository-app:latest"
        # --cache=true \
        # --cache-repo="registry.mwsapis.ru/mws-sdf/registry-cool-business-app/cache"


deploy:
  stage: deploy
  image: ${HELM_IMAGE}
  before_script:
    - apk add --no-cache curl kubectl helm
  script:
    - |
      helm upgrade --install ${HELM_RELEASE_NAME} ${HELM_CHART_PATH} \
        --namespace ${K8S_NAMESPACE} \
        --set image.repository=${CI_REGISTRY_IMAGE} \
        --set image.tag=${CI_COMMIT_SHA} \
        --set rollTimestamp=$(date +%s) \
        --timeout 10m \
        --wait \
        --atomic \
        --debug
